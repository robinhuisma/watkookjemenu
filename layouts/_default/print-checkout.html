{{ define "main" }}
<section class="checkout-hero">
  <div class="container">
    <h1>Bestel het gedrukte boek</h1>
    <p class="checkout-intro">
      <strong>&euro;39,00</strong> incl. BTW en verzending binnen Nederland &middot;
      Levertijd 5&ndash;7 werkdagen &middot;
      PDF wordt direct na betaling naar je mailadres gestuurd.
    </p>
  </div>
</section>

<section class="checkout-form-section">
  <div class="container">
    <form id="print-checkout-form" novalidate>

      <fieldset>
        <legend>Jouw gegevens</legend>
        <div class="form-row form-row--two">
          <div class="form-group">
            <label for="firstName">Voornaam <span aria-hidden="true">*</span></label>
            <input type="text" id="firstName" name="firstName" autocomplete="given-name" required />
          </div>
          <div class="form-group">
            <label for="lastName">Achternaam <span aria-hidden="true">*</span></label>
            <input type="text" id="lastName" name="lastName" autocomplete="family-name" required />
          </div>
        </div>
        <div class="form-group">
          <label for="email">E-mailadres <span aria-hidden="true">*</span></label>
          <input type="email" id="email" name="email" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="phone">Telefoonnummer <span aria-hidden="true">*</span></label>
          <input type="tel" id="phone" name="phone" autocomplete="tel" required />
        </div>
        <div class="form-group">
          <label for="company">Bedrijfsnaam <span class="optional">(optioneel)</span></label>
          <input type="text" id="company" name="company" autocomplete="organization" />
        </div>
      </fieldset>

      <fieldset>
        <legend>Afleveradres</legend>
        <div class="form-group">
          <label for="street">Straat + huisnummer <span aria-hidden="true">*</span></label>
          <input type="text" id="street" name="street" autocomplete="street-address" required />
        </div>
        <div class="form-row form-row--two">
          <div class="form-group">
            <label for="postcode">Postcode <span aria-hidden="true">*</span></label>
            <input type="text" id="postcode" name="postcode" autocomplete="postal-code"
              pattern="^[1-9][0-9]{3} ?[A-Za-z]{2}$" required />
          </div>
          <div class="form-group">
            <label for="city">Woonplaats <span aria-hidden="true">*</span></label>
            <input type="text" id="city" name="city" autocomplete="address-level2" required />
          </div>
        </div>
        <div class="form-group">
          <label for="country">Land <span aria-hidden="true">*</span></label>
          <select id="country" name="country" autocomplete="country" required>
            <option value="NL" selected>Nederland</option>
            <option value="BE">België</option>
            <option value="DE">Duitsland</option>
          </select>
        </div>
      </fieldset>

      <div id="form-error" class="form-error" hidden></div>

      <button type="submit" class="cta-button" id="submit-btn">
        Naar betaling &rarr;
      </button>

    </form>

    <p class="checkout-alt">
      Liever alleen digitaal?
      <a href="{{ .Site.Params.digitalURL }}">&euro;14,95 &rarr;</a>
    </p>
  </div>
</section>

<script>
(function () {
  var form = document.getElementById('print-checkout-form');
  var submitBtn = document.getElementById('submit-btn');
  var errorBox = document.getElementById('form-error');

  // Relax postcode pattern when country != NL
  var countrySelect = document.getElementById('country');
  var postcodeInput = document.getElementById('postcode');
  countrySelect.addEventListener('change', function () {
    if (countrySelect.value === 'NL') {
      postcodeInput.pattern = '^[1-9][0-9]{3} ?[A-Za-z]{2}$';
    } else {
      postcodeInput.removeAttribute('pattern');
    }
  });

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    errorBox.hidden = true;

    // Collect values
    var data = {
      firstName: form.firstName.value.trim(),
      lastName:  form.lastName.value.trim(),
      email:     form.email.value.trim(),
      phone:     form.phone.value.trim(),
      company:   form.company.value.trim(),
      street:    form.street.value.trim(),
      postcode:  form.postcode.value.trim(),
      city:      form.city.value.trim(),
      country:   form.country.value
    };

    submitBtn.disabled = true;
    submitBtn.textContent = 'Even geduld\u2026';

    fetch('/api/create-print-checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    })
    .then(function (res) {
      return res.json().then(function (body) {
        return { ok: res.ok, body: body };
      });
    })
    .then(function (result) {
      if (result.ok && result.body.url) {
        window.location.href = result.body.url;
      } else {
        showError(result.body.error || 'Er ging iets mis. Probeer opnieuw.');
      }
    })
    .catch(function () {
      showError('Geen verbinding. Controleer je internet en probeer opnieuw.');
    });
  });

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.hidden = false;
    submitBtn.disabled = false;
    submitBtn.textContent = 'Naar betaling \u2192';
    errorBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
})();
</script>
{{ end }}
